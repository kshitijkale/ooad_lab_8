<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Student Management System — Kshitij Kale</title>
    <link rel="stylesheet"
          href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css"
          integrity="sha384-MCw98/SFnGE8fJT3GXwEOngsV7Zt27NXFoaoApmYm81iuXoPkFOJwJ8ERdknLPMO"
          crossorigin="anonymous">
</head>
<body>
<div class="container my-4">
    <h1>Student Management System</h1>
    <p class="text-muted">Kshitij Kale — PES1UG23CS315 — Section F</p>
    <hr>

    <h2>Student Registration Form</h2>
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <form th:action="@{/students}" th:object="${student}" method="POST">
        <input type="text" th:field="*{name}" placeholder="Name" class="form-control mb-2 col-4" required>
        <small class="text-danger d-block mb-2" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></small>
        <input type="text" th:field="*{email}" placeholder="Email" class="form-control mb-2 col-4" required>
        <small class="text-danger d-block mb-2" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></small>
        <input type="text" th:field="*{course}" placeholder="Course" class="form-control mb-2 col-4" required>
        <small class="text-danger d-block mb-2" th:if="${#fields.hasErrors('course')}" th:errors="*{course}"></small>
        <button type="submit" class="btn btn-primary">Save Student</button>
    </form>

    <hr>
    <h2>Student List</h2>

    <table class="table table-striped table-responsive-md">
        <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Email</th>
                <th>Course</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="student : ${students}">
                <td th:text="${student.id}"></td>
                <td th:text="${student.name}"></td>
                <td th:text="${student.email}"></td>
                <td th:text="${student.course}"></td>
            </tr>
        </tbody>
    </table>
</div>
</body>
</html>
